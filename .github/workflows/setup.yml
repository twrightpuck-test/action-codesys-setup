name: CODESYS Installation Setup

on:
  push:
    branches:
      - main
      - cache-*
      - update-*
    paths-ignore:
      - 'README.md'

jobs:
  installer:
    permissions:
      contents: read
    uses: ./.github/workflows/test-install-installer.yml

  versions:
    permissions:
      contents: read
    uses: ./.github/workflows/test-install-versions.yml

  addons:
    permissions:
      contents: read
    uses: ./.github/workflows/test-install-addons.yml

  cache:
    permissions:
      contents: read
    uses: ./.github/workflows/test-install-cache.yml

  edge:
    permissions:
      contents: read
    uses: ./.github/workflows/test-install-edge.yml
