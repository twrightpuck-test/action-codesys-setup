name: Test Version Matrix

on:
  workflow_call:

jobs:
  installation-matrix:
    strategy:
      matrix:
        generation:
          - 3.5.16.0
          - 3.5.20.0
          - 3.5.21.0
          - 3.5.22.0
        architecture:
          - 32
          - 64
        include:
          - generation: 3.5.16.0
            patch: 3
          - generation: 3.5.20.0
            patch: 0
          - generation: 3.5.20.0
            patch: 1
          - generation: 3.5.20.0
            patch: 3
          - generation: 3.5.21.0
            patch: 2
          - generation: 3.5.21.0
            patch: 4
          - generation: 3.5.22.0
            patch: 0

    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup CODESYS
        id: setup_codesys
        uses: ./
        with:
          installer-version: 2.6.1.0
          auto-update-installer: false
          generation: ${{ matrix.generation }}
          architecture: ${{ matrix.architecture }}
          patch: ${{ matrix.patch }}

      - name: Test outputs
        shell: bash
        run: |
          echo "Installer path: ${{ steps.setup_codesys.outputs.installer-path }}"
          echo "Installer executable: ${{ steps.setup_codesys.outputs.installer-cli-executable }}"
          echo "CODESYS Path: ${{ steps.setup_codesys.outputs.codesys-path }}"
          echo "CODESYS executable: ${{ steps.setup_codesys.outputs.codesys-executable }}"

      - name: Upload info files
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: warn
          retention-days: 5
          name: ${{ matrix.generation }}-${{ matrix.patch }}-${{ matrix.architecture }}-info-files
          path: |
            ${{ steps.setup_codesys.outputs.installation-info-file-path }}
            ${{ steps.setup_codesys.outputs.add-ons-info-file-path }}

      - name: Verify CODESYS starts
        uses: ./.github/actions/verify-codesys
        with:
          codesys-executable: ${{ steps.setup_codesys.outputs.codesys-executable }}
          generation: ${{ matrix.generation }}
          patch: ${{ matrix.patch }}
